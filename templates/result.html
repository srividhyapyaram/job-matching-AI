<!DOCTYPE html>
<html>
<head>
    <title>Results - JobMatch AI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            font-family: Arial, sans-serif;
        }

        .box {
            width: 600px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        ul {
            padding-left: 20px;
        }

        .section {
            margin-bottom: 25px;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            background-color: #e74a3b;
            padding: 10px;
            border-radius: 6px;
        }

        a:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>🎯 Job Recommendations</h2>

        <div class="section">
            <h3>Matching Jobs:</h3>
            <ul>
                {% for job in jobs %}
                <li>{{ job }}</li>
                {% endfor %}
            </ul>
        </div>

        <div class="section">
            <h3>Skill Gaps:</h3>
            <ul>
                {% for gap in gaps %}
                <li>{{ gap }}</li>
                {% endfor %}
            </ul>
        </div>

        <a href="/skills">Back</a>
    </div>

</body>
</html>
